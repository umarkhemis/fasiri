# ============================================================
# Fasiri – Nginx Main Configuration
# Tuned for API workloads: long timeouts, gzip, security headers
# ============================================================

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/json;

    # ── Logging ───────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time $upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;     # hide nginx version

    # ── Gzip ──────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      application/json application/javascript
                    text/plain text/css text/xml;

    # ── Security headers ──────────────────────────────────
    add_header X-Frame-Options          "DENY"            always;
    add_header X-Content-Type-Options   "nosniff"         always;
    add_header X-XSS-Protection         "1; mode=block"   always;
    add_header Referrer-Policy          "no-referrer"     always;
    add_header Permissions-Policy       "geolocation=()"  always;

    # ── Rate limiting zones ───────────────────────────────
    # Global: 30 req/s per IP across all endpoints
    limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;
    # Strict: 5 req/s for auth endpoints
    limit_req_zone $binary_remote_addr zone=auth:5m   rate=5r/s;
    # Upload: 2 req/s for STT (large file uploads)
    limit_req_zone $binary_remote_addr zone=upload:5m rate=2r/s;

    limit_req_status 429;

    # ── Timeouts (generous for translation/STT) ───────────
    proxy_connect_timeout  10s;
    proxy_send_timeout     90s;    # STT can be slow
    proxy_read_timeout     90s;
    send_timeout           90s;

    # ── Client body size (for STT audio uploads) ──────────
    client_max_body_size   15M;

    # ── Upstream: the Fasiri API container ──────────────
    upstream fasiri_api {
        server api:8000;
        keepalive 32;
    }

    # Include virtual host configs
    include /etc/nginx/conf.d/*.conf;
}
