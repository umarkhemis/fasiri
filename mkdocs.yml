site_name: Fasiri Documentation
site_description: Unified translation and speech API for 30+ African languages
site_url: https://docs.fasiri.ai
repo_url: https://github.com/umarkhemis/fasiri
repo_name: umarkhemis/fasiri
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: green
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  logo: assets/logo.png
  favicon: assets/favicon.png

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [sdk]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Authentication: getting-started/authentication.md
      - Quick Start: getting-started/quickstart.md
  - Guides:
      - Translation: guides/translation.md
      - Batch Translation: guides/batch.md
      - Speech-to-Text: guides/stt.md
      - Text-to-Speech: guides/tts.md
      - Languages: guides/languages.md
      - Error Handling: guides/errors.md
  - API Reference:
      - Translation: api/translate.md
      - Speech: api/speech.md
      - Languages: api/languages.md
      - Auth: api/auth.md
  - Python SDK:
      - Overview: sdk/overview.md
      - Fasiri Client: sdk/client.md
      - Async Usage: sdk/async.md
      - Data Classes: sdk/dataclasses.md
      - Exceptions: sdk/exceptions.md
  - Providers:
      - Overview: providers/overview.md
      - Sunbird AI: providers/sunbird.md
      - Khaya AI: providers/khaya.md
      - HuggingFace: providers/huggingface.md
  - Self-Hosting:
      - Docker: self-hosting/docker.md
      - Environment Variables: self-hosting/env.md
      - Production: self-hosting/production.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/umarkhemis/fasiri
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/fasiri
