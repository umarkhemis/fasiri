site_name: Fasiri Documentation
site_description: Unified translation and speech API for 30+ African languages
site_url: https://umarkhemis.github.io/fasiri
repo_url: https://github.com/umarkhemis/fasiri
repo_name: umarkhemis/fasiri
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/fasiri-icon.png
  favicon: assets/favicon.png
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - assets/stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Authentication: getting-started/authentication.md
      - Quick Start: getting-started/quickstart.md
      - Supported Languages: getting-started/languages.md
  - Guides:
      - Translation: guides/translation.md
      - Batch Translation: guides/batch.md
      - Batch at Scale: guides/batch-at-scale.md
      - Direct Mode: guides/direct-mode.md
      - Speech Workflows: guides/speech-workflows.md
      - Provider Routing: guides/provider-routing.md
      - Rate Limits: guides/rate-limits.md
      - Error Handling: guides/error-handling.md
      - Multilingual Apps: guides/multilingual-app.md
  - API Reference:
      - Overview: api-reference/index.md
      - Translation: api-reference/translation.md
      - Batch Translation: api-reference/batch.md
      - Speech-to-Text: api-reference/stt.md
      - Text-to-Speech: api-reference/tts.md
      - Languages: api-reference/languages.md
      - Authentication: api-reference/auth.md
      - Errors: api-reference/errors.md
  - Python SDK:
      - Overview: sdk-reference/index.md
      - Fasiri Client: sdk-reference/client.md
      - Async Usage: sdk-reference/async.md
      - Translation: sdk-reference/translate.md
      - Batch: sdk-reference/batch.md
      - Speech: sdk-reference/speech.md
      - Data Types: sdk-reference/types.md
      - Exceptions: sdk-reference/exceptions.md
  - Providers:
      - Overview: providers/overview.md
  - Examples:
      - Overview: examples/index.md
      - FastAPI Integration: examples/fastapi.md
      - Django Integration: examples/django.md
      - Chatbot: examples/chatbot.md
      - Document Translation: examples/document-translation.md
      - Transcribe Audio: examples/transcribe-audio.md
  - Self-Hosting:
      - Docker: self-hosting/docker.md
      - Environment Variables: self-hosting/env.md
  - Contributing: contributing.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/umarkhemis/fasiri
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/fasiri
      name: PyPI

