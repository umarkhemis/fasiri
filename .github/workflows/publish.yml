# ============================================================
# Fasiri - PyPI Publish Workflow
#
# Triggers when you push a version tag: git tag v1.0.1 && git push --tags
# Uses PyPI Trusted Publishing (no API token needed - more secure)
#
# Setup (one-time):
#   1. Go to pypi.org → Your projects → Fasiri → Publishing
#   2. Add a "trusted publisher":
#      - Owner:    umarkhemis
#      - Repo:     fasiri
#      - Workflow: publish.yml
#      - Environment: pypi
# ============================================================

name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"      # triggers on v1.0.0, v1.0.1, v2.0.0, etc.
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:

  # ── 1. Run tests before publishing ─────────────────────────
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          pip install -r requirements.txt python-multipart pytest pytest-asyncio
          pip install -e sdk/
          pytest tests/ -q
        env:
          FASIRI_SECRET_KEY: ci-test-secret

  # ── 2. Build the package ────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify the distribution
        run: twine check dist/*

      - name: Show what was built
        run: ls -lh dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 3. Publish to TestPyPI first ───────────────────────────
  publish-test:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment: testpypi
    permissions:
      id-token: write    # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ── 4. Smoke test from TestPyPI ────────────────────────────
  smoke-test:
    name: Smoke test TestPyPI install
    runs-on: ubuntu-latest
    needs: publish-test
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install from TestPyPI
        run: |
          pip install --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            fasiri
        continue-on-error: true   # TestPyPI sometimes has propagation delays

      - name: Test import
        run: |
          python -c "
          from fasiri import Fasiri, TranslationResult, AuthenticationError
          print('Import OK')
          try:
              Fasiri()
          except AuthenticationError:
              print('Auth check OK')
          "
        continue-on-error: true

  # ── 5. Publish to PyPI (production) ────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, smoke-test]
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            pip install fasiri==${{ github.ref_name }}
            ```

            ## What's Changed
            See [CHANGELOG.md](https://github.com/umarkhemis/fasiri/blob/main/CHANGELOG.md)
