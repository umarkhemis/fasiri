# ============================================================
# Fasiri – Deploy Documentation to GitHub Pages
#
# Triggers on every push to main that changes docs/ or mkdocs.yml
# Also runs on manual trigger (workflow_dispatch)
#
# Setup (one-time):
#   1. GitHub repo → Settings → Pages
#   2. Source: "GitHub Actions"
#   3. That's it — this workflow handles the rest
#
# Your docs will be live at:
#   https://umarkhemis.github.io/fasiri/
# Or with a custom domain:
#   https://docs.fasiri.betatechlabs.io
# ============================================================

name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history for git-revision-date plugin

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs and plugins
        run: |
          pip install \
            mkdocs-material \
            mkdocstrings[python] \
            mkdocs-minify-plugin \
            mkdocs-git-revision-date-localized-plugin \
            mike

      - name: Build documentation
        run: mkdocs build --strict --verbose
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment deployment URL
        run: |
          echo "Docs deployed to: ${{ steps.deployment.outputs.page_url }}"
