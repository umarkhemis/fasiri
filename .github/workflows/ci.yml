# ============================================================
# Fasiri – GitHub Actions CI/CD Pipeline
#
# Triggers on:
#   push to main     → full test + build + deploy
#   pull requests    → test only (no deploy)
#   manual trigger   → full pipeline
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   DOCKER_USERNAME       – Docker Hub username
#   DOCKER_PASSWORD       – Docker Hub token
#   DEPLOY_HOST           – your server IP or hostname
#   DEPLOY_USER           – SSH user (e.g. ubuntu)
#   DEPLOY_SSH_KEY        – your private SSH key (full contents)
#   HUGGINGFACE_API_KEY   – for integration smoke test post-deploy
#   SUNBIRD_API_KEY       – for integration smoke test post-deploy
#   KHAYA_API_KEY         – for integration smoke test post-deploy
# ============================================================

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/fasiri-api
  IMAGE_TAG:  ${{ github.sha }}

jobs:

  # ============================================================
  # JOB 1: Test
  # ============================================================
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install python-multipart pytest pytest-asyncio

      - name: Install Fasiri SDK (from root pyproject.toml)
        run: |
          pip install -e .

      - name: Run unit tests
        run: pytest tests/ -v --tb=short -q
        env:
          FASIRI_SECRET_KEY: test-secret-key-for-ci
          HUGGINGFACE_API_KEY: ""
          SUNBIRD_API_KEY: ""
          KHAYA_API_KEY: ""

      - name: Lint check
        run: |
          pip install ruff
          ruff check app/ --select E,F,W --ignore E501

      - name: Test summary
        if: always()
        run: echo "Tests complete"

  # ============================================================
  # JOB 2: Build & Push Docker Image
  # ============================================================
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image summary
        run: |
          echo "Image pushed: ${{ env.IMAGE_NAME }}:latest"
          echo "SHA tag:      ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"

  # ============================================================
  # JOB 3: Deploy to Server
  # ============================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
            set -e

            echo "==> Navigating to app directory"
            cd /opt/fasiri

            echo "==> Pulling latest image"
            docker compose pull api

            echo "==> Rolling restart (zero downtime)"
            docker compose up -d --no-deps --build api

            echo "==> Waiting for health check..."
            sleep 15
            docker compose ps

            echo "==> Cleaning up old images"
            docker image prune -f

            echo "==> Deploy complete"
          ENDSSH

      - name: Smoke test post-deploy
        run: |
          sleep 10
          curl -f https://${{ secrets.DEPLOY_HOST }}/health || exit 1
          echo "Health check passed"

      - name: Notify on failure
        if: failure()
        run: |
          echo "DEPLOY FAILED on commit ${{ github.sha }}"
          echo "Check GitHub Actions logs for details"

  # ============================================================
  # JOB 4: Publish SDK to PyPI
  # ============================================================
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  # ============================================================
  # JOB 5: Deploy Docs to GitHub Pages
  # ============================================================
  docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for mkdocs git-revision-date plugin

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          pip install mkdocs-material mkdocstrings[python] mkdocs-git-revision-date-localized-plugin

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # JOB 6: Security Scan
  # ============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0        # don't fail the pipeline on findings
          severity: HIGH,CRITICAL
