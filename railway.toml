# ============================================================
# Fasiri – Railway Deployment Configuration
# https://railway.app
#
# Deploy in 3 steps:
#   1. Push this repo to GitHub
#   2. Connect to Railway: railway.app/new → GitHub repo
#   3. Set env vars in Railway dashboard
#
# Railway auto-detects the Dockerfile and builds it.
# ============================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1 --loop uvloop"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "fasiri-api"
