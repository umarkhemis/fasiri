# ============================================================
# Fasiri – Docker Compose (Production)
#
# Services:
#   api     – FastAPI application (2 workers)
#   redis   – Rate limiting + caching
#   nginx   – Reverse proxy, SSL termination, gzip
#
# Usage:
#   cp env.example .env && nano .env      # fill in your keys
#   docker compose up -d                  # start all services
#   docker compose logs -f api            # watch API logs
#   docker compose down                   # stop all
#
# First deploy:
#   docker compose up -d --build
# ============================================================

services:

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Don't expose Redis externally — internal only
    expose:
      - "6379"

  # ── Fasiri API ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      # Provider keys (loaded from .env)
      HUGGINGFACE_API_KEY:   ${HUGGINGFACE_API_KEY}
      SUNBIRD_API_KEY:       ${SUNBIRD_API_KEY}
      # Auth
      FASIRI_SECRET_KEY:   ${FASIRI_SECRET_KEY}
      API_KEY_TTL_SECONDS:   ${API_KEY_TTL_SECONDS:-31536000}
      # Rate limiting
      RATE_LIMIT_RPM:        ${RATE_LIMIT_RPM:-60}
      RATE_LIMIT_BATCH_RPM:  ${RATE_LIMIT_BATCH_RPM:-10}
      # Redis — use internal service name
      REDIS_URL:             redis://redis:6379/0
      # Provider URLs
      SUNBIRD_BASE_URL:      ${SUNBIRD_BASE_URL:-https://api.sunbird.ai}
      HUGGINGFACE_BASE_URL:  ${HUGGINGFACE_BASE_URL:-https://router.huggingface.co/hf-inference/models}
      DEFAULT_MODEL_ID:      ${DEFAULT_MODEL_ID:-Helsinki-NLP/opus-mt-en-mul}
      # App
      BASE_URL:              ${BASE_URL:-https://fasiri.yourdomain.com}
      DEBUG:                 ${DEBUG:-false}
      LOG_LEVEL:             ${LOG_LEVEL:-info}
      WORKERS:               ${WORKERS:-2}
      HTTP_TIMEOUT:          ${HTTP_TIMEOUT:-30}
      HTTP_TIMEOUT_STT:      ${HTTP_TIMEOUT_STT:-60}
    expose:
      - "8000"
    networks:
      - internal
      - external
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; r=httpx.get('http://localhost:8000/health',timeout=8); exit(0 if r.status_code==200 else 1)"]
      interval: 30s
      timeout: 15s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Nginx ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # mount your SSL certs here
      - nginx_logs:/var/log/nginx
    networks:
      - external
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

networks:
  internal:
    driver: bridge
    internal: true          # Redis not reachable from outside
  external:
    driver: bridge

volumes:
  redis_data:
  nginx_logs:
